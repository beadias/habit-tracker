<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Hábitos</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- TELA INICIAL -->
  <div id="telaInicial" class="container">
    <div class="card">
        <h1>Bem-vindo ao seu sistema de gestão de hábitos!👋</h1>
        <p>Informe seus dados para começar a registrar sua rotina.</p>

      <input type="text" id="nomeUsuario" placeholder="Digite seu nome" />
      <input type="number" id="idadeUsuario" placeholder="Digite sua idade" />

      <button onclick="iniciarSistema()">Iniciar</button>
    </div>
  </div>

  <!--SISTEMA -->
  <div id="sistema" class="container hidden">

    <!--TOPO -->
    <div class="card topo">
      <div>
        <h2 id="boasVindas"></h2>
      </div>

      <div class="info-direita">
        <span id="idade"></span><br>
        <span id="dataHoje"></span>
      </div>
    </div>

    <!-- FORMULÁRIO -->
    <div class="card">
      <form id="formHabito">
        <input type="text" id="nome" placeholder="Nome do hábito" required />

        <select id="frequencia" required>
          <option value="">Selecione a frequência</option>
          <option value="Diário">Diário</option>
          <option value="Semanal">Semanal</option>
        </select>

        <button type="submit">Cadastrar hábito</button>
      </form>
    </div>

    <!--LISTA -->
    <div class="card">
      <h2>Hábitos cadastrados</h2>
      <div id="listaHabitos"></div>
    </div>

  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h3>Editar hábito</h3>

      <input type="text" id="editNome" placeholder="Nome do hábito"/>
      <select id="editFrequencia">
        <option value="Diário">Diário</option>
        <option value="Semanal">Semanal</option>
      </select>

      <div class="modal-buttons">
        <button onclick="salvarEdicao()">Salvar</button>
        <button onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
